{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmer la suppression — BB MALLs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <style>
        .delete-section { padding: 120px 0; background: #f7f5f2; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .delete-container { max-width: 500px; width: 90%; background: #fff; padding: 48px; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.05); text-align: center; }
        .danger-icon { width: 80px; height: 80px; background: #fee2e2; color: #ef4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 24px; }
        .delete-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 12px; }
        .delete-text { color: #6b7280; margin-bottom: 32px; line-height: 1.6; }
        .delete-actions { display: flex; flex-direction: column; gap: 12px; }
        .btn-confirm { background: #ef4444; color: #fff; padding: 14px; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; width: 100%; text-decoration: none; }
        .btn-confirm:hover { background: #dc2626; transform: translateY(-2px); }
        .btn-cancel { background: #f3f4f6; color: #4b5563; padding: 14px; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; width: 100%; text-decoration: none; display: block; }
        .btn-cancel:hover { background: #e5e7eb; }
    </style>
</head>
<body>

<section class="delete-section">
    <div class="delete-container">
        <div class="danger-icon"><i class="fas fa-exclamation-triangle"></i></div>
        <h1 class="delete-title">Supprimer la boutique ?</h1>
        <p class="delete-text">Êtes-vous sûr de vouloir supprimer <strong>{{ shop.name }}</strong> ? Cette action est irréversible et supprimera toutes les données associées.</p>
        
        <form method="post" class="delete-actions">
            {% csrf_token %}
            <button type="submit" class="btn-confirm">Oui, supprimer définitivement</button>
            <a href="{% url 'shops_manage' %}" class="btn-cancel">Annuler</a>
        </form>
    </div>
</section>

</body>
</html>
